version: '3.8'

services:
  # PostgreSQL Database (Supabase backend)
  postgres:
    image: postgres:15-alpine
    container_name: integrity-postgres
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_INITDB_ARGS: "-c log_statement=all"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - integrity-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: integrity-redis
    ports:
      - "6379:6379"
    networks:
      - integrity-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # pgAdmin for database management (optional, for DEMO)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: integrity-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@demo.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    networks:
      - integrity-network
    depends_on:
      - postgres

networks:
  integrity-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
